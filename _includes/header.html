<!-- Reading progress bar: fixed, unobtrusive, fills as you scroll a post. -->
<div id="progress-bar" aria-hidden="true"><span id="progress-fill"></span></div>

<header class="site-header">
  <div class="wrap header-inner">
    <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>

    <nav class="site-nav" aria-label="Primary">
      <a href="{{ '/' | relative_url }}">Writing</a>
      <a href="{{ '/about/' | relative_url }}">About</a>
      {%- if site.github_username and site.github_username != "" -%}
      <a href="https://github.com/{{ site.github_username }}" rel="me">GitHub</a>
      {%- endif -%}
    </nav>

    <!-- Settings popover: font + theme. -->
    <div class="settings">
      <button id="settings-toggle" class="icon-btn" aria-expanded="false"
              aria-controls="settings-menu" title="Reading settings">Aa</button>

      <div id="settings-menu" class="settings-menu" role="menu" hidden>
        <p class="settings-label">Reading font</p>
        <div class="font-options" role="radiogroup" aria-label="Reading font">
          <button class="font-opt" data-font="newsreader" style="font-family:'Newsreader',serif">Newsreader</button>
          <button class="font-opt" data-font="lora"       style="font-family:'Lora',serif">Lora</button>
          <button class="font-opt" data-font="inter"      style="font-family:'Inter',sans-serif">Inter</button>
        </div>

        <p class="settings-label">Appearance</p>
        <div class="theme-options" role="radiogroup" aria-label="Appearance">
          <button class="theme-opt" data-theme-set="light">☀︎ Light</button>
          <button class="theme-opt" data-theme-set="dark">☾ Dark</button>
        </div>
      </div>
    </div>
  </div>
</header>
