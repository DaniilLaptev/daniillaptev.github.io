<div id="progress-bar" aria-hidden="true"><span id="progress-fill"></span></div>
<a class="skip-link" href="#content">Skip to content</a>

<header class="site-rail" aria-label="Site">
  <a class="rail-brand" href="{{ '/' | relative_url }}">
    <span class="rail-kicker">Into the</span>
    <span class="rail-name">Sky</span>
  </a>

  <nav class="rail-nav" aria-label="Primary">
    <a class="nav-posts" href="{{ '/posts/' | relative_url }}"{% if page.url == "/posts/" or page.layout == "post" %} aria-current="page"{% endif %}>Posts</a>
    <a class="nav-papers" href="{{ '/papers/' | relative_url }}"{% if page.url == "/papers/" %} aria-current="page"{% endif %}>Papers</a>
    <a class="nav-about" href="{{ '/about/' | relative_url }}"{% if page.url == "/about/" %} aria-current="page"{% endif %}>About</a>
  </nav>
</header>
